<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Device Shop Checkout</title>

<style>

*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body{
    font-family: Arial, sans-serif;
}

.bg{
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    width: 100%;
}

.head{
    text-align: center;
    margin-top: 30px;
    color: white;
}

.headp{
    display: inline;
}

#bcg{
    background-color: black;
    padding: 5px 10px;
    border-radius: 10px;
}

.main{
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 40px;
    flex-wrap: wrap;
}

.bodyS,
.cont{
    background-color: rgb(229,233,233);
    border-radius: 10px;
    padding: 20px;
    width: 500px;
}

.bodyS table{
    width: 100%;
}

.bodyS td{
    padding: 10px;
}

.box{
    width: 100px;
    height: 100px;
    background-color: white;
    border-radius: 10px;

    display: flex;
    justify-content: center;
    align-items: center;
}

.box img{
    max-width: 80px;
    max-height: 80px;
}

.coupon-row{
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.coupon{
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.btn{
    background-color: black;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 15px;
    cursor: pointer;
}

.summary{
    width: 100%;
    margin-top: 20px;
}

.summary td{
    padding: 8px 0;
}

input{
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-top: 5px;
    margin-bottom: 15px;
}

.country-row{
    display: flex;
    gap: 10px;
}

.country-row div{
    flex: 1;
}

.butn{
    width: 100%;
    background-color: black;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 15px;
    cursor: pointer;
    margin-top: 10px;
}

</style>
</head>

<body>

<img src="resources/background-image.png" alt="background" class="bg">

<div class="head">
    <h2 class="headp">Checkout</h2>
    <h4 class="headp" id="bcg">3 ITEMS</h4>
</div>

<div class="main">

    <!-- PANIER -->
    <div class="bodyS">

        <table>

            <tr>
                <td>
                    <div class="box">
                        <img src="resources/Gold.png" alt="">
                    </div>
                </td>

                <td>
                    <h3>iPhone 12 Pro</h3>
                    <p>Golden</p>
                    <p>x 1</p>
                </td>

                <td>
                    <h3>$999.00</h3>
                </td>
            </tr>

            <tr>
                <td>
                    <div class="box">
                        <img src="resources/Apple-watch.png" alt="">
                    </div>
                </td>

                <td>
                    <h3>Apple Watch</h3>
                    <p>Blue</p>
                    <p>x 1</p>
                </td>

                <td>
                    <h3>$399.00</h3>
                </td>
            </tr>

            <tr>
                <td>
                    <div class="box">
                        <img src="resources/iMac.png" alt="">
                    </div>
                </td>

                <td>
                    <h3>iMac</h3>
                    <p>Green</p>
                    <p>x 1</p>
                </td>

                <td>
                    <h3>$1199.00</h3>
                </td>
            </tr>

        </table>

        <div class="coupon-row">
            <input
                type="text"
                class="coupon"
                placeholder="Enter coupon code"
            >

            <button class="btn">
                Apply Coupon
            </button>
        </div>

        <table class="summary">

            <tr>
                <td>Sub total</td>
                <td>$2597.00</td>
            </tr>

            <tr>
                <td>Tax</td>
                <td>$623.28</td>
            </tr>

            <tr>
                <td>Total</td>
                <td>$3220.28</td>
            </tr>

        </table>

    </div>

    <!-- FORMULAIRE -->
    <div class="cont">

        <h2>Contact Information</h2>

        <br>

        <p>First & Last Name</p>
        <input
            type="text"
            placeholder="Enter first & last name"
        >

        <p>Email Address</p>
        <input
            type="email"
            placeholder="Enter email address"
        >

        <div class="country-row">

            <div>
                <p>Country</p>
                <input
                    type="text"
                    placeholder="Finland"
                >
            </div>

            <div>
                <p>Postal Code</p>
                <input
                    type="text"
                    placeholder="00270"
                >
            </div>

        </div>

        <button class="butn">
            Continue
        </button>

    </div>

</div>

</body>
</html>
